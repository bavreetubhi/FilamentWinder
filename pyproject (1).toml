[build-system]
requires = ["hatchling>=1.24"]
build-backend = "hatchling.build"

[project]
name = "filament-winder"
version = "0.1.0"
description = "Python-based 4-axis filament winding planner for axisymmetric wet winding"
readme = "README.md"
requires-python = ">=3.10"
authors = [{ name = "Bavreet Ubhi" }]
dependencies = [
  "numpy>=1.24",
]

[project.optional-dependencies]
dxf = ["ezdxf>=1.3"]
gui = ["PySide6>=6.6", "vispy>=0.14"]
plot = ["matplotlib>=3.8"]
dev = ["pytest>=8.0", "ruff>=0.5", "mypy>=1.10"]
all = ["ezdxf>=1.3", "PySide6>=6.6", "vispy>=0.14", "matplotlib>=3.8"]

[project.scripts]
filament-winder = "filament_winder.cli:main"

[tool.hatch.build.targets.wheel]
packages = ["src/filament_winder"]

[tool.pytest.ini_options]
addopts = "-q"
testpaths = ["tests"]

[tool.ruff]
line-length = 100
target-version = "py310"

[tool.ruff.lint]
select = ["E", "F", "I", "B", "UP", "SIM"]

[tool.mypy]
python_version = "3.10"
warn_unused_configs = true
disallow_untyped_defs = true
ignore_missing_imports = true
